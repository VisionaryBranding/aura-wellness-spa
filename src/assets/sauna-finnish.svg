<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b98249"/>
      <stop offset="55%" stop-color="#80522e"/>
      <stop offset="100%" stop-color="#1b231d"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#ffd59b" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#ffd59b" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity=".35"/>
  
  <rect x="0" y="520" width="1200" height="280" fill="#9c6b3e" opacity=".55"/>
  <g opacity=".55" stroke="#f5c487" stroke-width="10">
    <path d="M0 560H1200M0 620H1200M0 680H1200"/>
    <path d="M80 0V800M200 0V800M320 0V800M440 0V800M560 0V800M680 0V800M800 0V800M920 0V800M1040 0V800"/>
  </g>
  <rect x="135" y="455" width="850" height="92" rx="18" fill="#d3a066" opacity=".72"/>
  <rect x="140" y="545" width="900" height="80" rx="18" fill="#7a4f2f" opacity=".85"/>
  <rect x="760" y="360" width="150" height="160" rx="25" fill="#161c18" opacity=".88"/>
  <circle cx="835" cy="535" r="95" fill="#313b34"/>
  <g fill="#8d968a">
    <circle cx="790" cy="500" r="25"/><circle cx="835" cy="485" r="28"/><circle cx="875" cy="512" r="24"/>
    <circle cx="808" cy="545" r="27"/><circle cx="855" cy="555" r="31"/>
  </g>

  <text x="70" y="730" fill="rgba(255,255,255,.62)" font-family="Inter, Arial" font-size="28" font-weight="800" letter-spacing="8">FINNISH SAUNA</text>
