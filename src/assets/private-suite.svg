<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b674d"/>
      <stop offset="55%" stop-color="#44372a"/>
      <stop offset="100%" stop-color="#111915"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#ffd49a" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#ffd49a" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity=".35"/>
  
  <rect x="0" y="520" width="1200" height="280" fill="#201914" opacity=".72"/>
  <rect x="95" y="270" width="445" height="270" rx="30" fill="#d4b48a" opacity=".35"/>
  <rect x="660" y="250" width="380" height="290" rx="30" fill="#18231d" opacity=".78"/>
  <rect x="690" y="288" width="320" height="210" rx="24" fill="#89bfc6" opacity=".38"/>
  <rect x="150" y="500" width="820" height="90" rx="22" fill="#d0a875" opacity=".5"/>
  <circle cx="285" cy="200" r="120" fill="#ffd49a" opacity=".16" filter="url(#blur)"/>

  <text x="70" y="730" fill="rgba(255,255,255,.62)" font-family="Inter, Arial" font-size="28" font-weight="800" letter-spacing="8">PRIVATE SUITE</text>
</svg>