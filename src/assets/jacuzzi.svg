<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a7c7c9"/>
      <stop offset="55%" stop-color="#527b7b"/>
      <stop offset="100%" stop-color="#12201c"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#dffcff" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#dffcff" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity=".35"/>
  
  <ellipse cx="600" cy="520" rx="420" ry="155" fill="#224c4d" opacity=".85"/>
  <ellipse cx="600" cy="495" rx="395" ry="130" fill="#82d1dc" opacity=".68"/>
  <g fill="#ffffff" opacity=".68">
    <circle cx="420" cy="460" r="10"/><circle cx="515" cy="500" r="7"/><circle cx="630" cy="455" r="9"/>
    <circle cx="750" cy="510" r="8"/><circle cx="850" cy="470" r="12"/><circle cx="560" cy="540" r="10"/>
    <circle cx="700" cy="545" r="7"/>
  </g>
  <g fill="#ffffff" opacity=".2" filter="url(#blur)">
    <circle cx="330" cy="350" r="100"/><circle cx="770" cy="330" r="130"/>
  </g>
  <rect x="130" y="610" width="940" height="95" rx="28" fill="#d0b386" opacity=".35"/>

  <text x="70" y="730" fill="rgba(255,255,255,.62)" font-family="Inter, Arial" font-size="28" font-weight="800" letter-spacing="8">HYDROTHERAPY JACUZZI</text>
</svg>