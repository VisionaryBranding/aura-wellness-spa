<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b9beb5"/>
      <stop offset="55%" stop-color="#6d7e72"/>
      <stop offset="100%" stop-color="#18251f"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity=".35"/>
  
  <rect x="0" y="530" width="1200" height="270" fill="#111d18" opacity=".65"/>
  <g fill="#ffffff" opacity=".22" filter="url(#blur)">
    <circle cx="240" cy="340" r="140"/><circle cx="430" cy="300" r="180"/><circle cx="690" cy="330" r="210"/><circle cx="940" cy="310" r="160"/>
    <circle cx="330" cy="560" r="180"/><circle cx="780" cy="580" r="200"/>
  </g>
  <rect x="120" y="490" width="960" height="80" rx="20" fill="#31443b" opacity=".6"/>
  <circle cx="260" cy="480" r="70" fill="#26352f"/>
  <circle cx="940" cy="480" r="70" fill="#26352f"/>
  <path d="M230 560C260 510 310 505 345 555M900 555C930 505 985 505 1015 555" stroke="#d6ded6" stroke-width="12" fill="none" opacity=".5"/>

  <text x="70" y="730" fill="rgba(255,255,255,.62)" font-family="Inter, Arial" font-size="28" font-weight="800" letter-spacing="8">STEAM ROOM</text>
</svg>