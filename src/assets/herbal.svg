<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#526f48"/>
      <stop offset="55%" stop-color="#2d422b"/>
      <stop offset="100%" stop-color="#111b14"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#abe28c" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#abe28c" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity=".35"/>
  
  <rect x="0" y="535" width="1200" height="265" fill="#122019" opacity=".7"/>
  <g fill="#9fcf82" opacity=".48">
    <path d="M230 520C200 390 250 270 370 210C405 350 350 475 230 520Z"/>
    <path d="M760 500C720 365 770 240 900 180C930 320 880 450 760 500Z"/>
    <path d="M480 520C455 410 510 300 615 260C635 380 590 485 480 520Z"/>
  </g>
  <g stroke="#d6efd0" stroke-width="10" opacity=".3" filter="url(#blur)">
    <path d="M180 560C230 460 270 420 330 310"/>
    <path d="M720 560C770 450 820 390 880 270"/>
  </g>
  <rect x="130" y="565" width="940" height="72" rx="22" fill="#8d7146" opacity=".38"/>

  <text x="70" y="730" fill="rgba(255,255,255,.62)" font-family="Inter, Arial" font-size="28" font-weight="800" letter-spacing="8">HERBAL SAUNA</text>
</svg>