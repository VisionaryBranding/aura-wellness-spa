<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#292821"/>
      <stop offset="55%" stop-color="#3b3b30"/>
      <stop offset="100%" stop-color="#111713"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#e48a3e" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#e48a3e" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity=".35"/>
  
  <rect x="0" y="510" width="1200" height="290" fill="#151c17" opacity=".82"/>
  <rect x="215" y="470" width="760" height="95" rx="48" fill="#cfa978" opacity=".45"/>
  <circle cx="270" cy="420" r="58" fill="#d9b38a" opacity=".75"/>
  <rect x="345" y="375" width="380" height="120" rx="60" fill="#d4a978" opacity=".72"/>
  <path d="M730 370 C820 330 900 345 940 405" stroke="#e2bd91" stroke-width="34" stroke-linecap="round" fill="none" opacity=".85"/>
  <circle cx="925" cy="385" r="28" fill="#e2bd91" opacity=".85"/>
  <circle cx="915" cy="175" r="160" fill="#e48a3e" opacity=".16" filter="url(#blur)"/>

  <text x="70" y="730" fill="rgba(255,255,255,.62)" font-family="Inter, Arial" font-size="28" font-weight="800" letter-spacing="8">MASSAGE THERAPY</text>
</svg>