<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4915d"/>
      <stop offset="55%" stop-color="#6a4c31"/>
      <stop offset="100%" stop-color="#18211d"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#9ad3ff" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#9ad3ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity=".35"/>
  
  <rect x="0" y="540" width="1200" height="260" fill="#6e4c2d" opacity=".62"/>
  <path d="M120 520Q600 90 1080 520" fill="#121b17" opacity=".72"/>
  <path d="M200 500Q600 160 1000 500" fill="#8bcbe1" opacity=".65"/>
  <path d="M200 500 C380 430 520 460 650 420 C780 380 880 430 1000 390 V500Z" fill="#376f74" opacity=".5"/>
  <rect x="100" y="520" width="1000" height="80" fill="#aa7546" opacity=".7"/>
  <rect x="720" y="375" width="105" height="150" rx="25" fill="#101712"/>
  <circle cx="775" cy="535" r="70" fill="#313b34"/>

  <text x="70" y="730" fill="rgba(255,255,255,.62)" font-family="Inter, Arial" font-size="28" font-weight="800" letter-spacing="8">PANORAMIC SAUNA</text>
</svg>