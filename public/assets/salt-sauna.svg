<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d7c7b6"/>
      <stop offset="55%" stop-color="#807567"/>
      <stop offset="100%" stop-color="#17211d"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#fff2db" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#fff2db" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity=".35"/>
  
  <rect x="0" y="535" width="1200" height="265" fill="#1b2a24" opacity=".7"/>
  <g opacity=".55">
    <circle cx="120" cy="575" r="35" fill="#d9d6cc"/><circle cx="190" cy="550" r="28" fill="#bdb8aa"/>
    <circle cx="260" cy="575" r="38" fill="#e6e0d1"/><circle cx="340" cy="555" r="30" fill="#c7c0b2"/>
    <circle cx="730" cy="555" r="35" fill="#d9d6cc"/><circle cx="810" cy="580" r="45" fill="#e4ded1"/>
    <circle cx="900" cy="545" r="32" fill="#bcb5a8"/><circle cx="990" cy="580" r="44" fill="#ded8ca"/>
  </g>
  <g fill="#ffffff" opacity=".2" filter="url(#blur)">
    <circle cx="380" cy="310" r="180"/><circle cx="680" cy="340" r="160"/>
  </g>
  <rect x="120" y="455" width="960" height="76" rx="18" fill="#b5aa99" opacity=".32"/>

  <text x="70" y="730" fill="rgba(255,255,255,.62)" font-family="Inter, Arial" font-size="28" font-weight="800" letter-spacing="8">SALT SAUNA</text>
</svg>