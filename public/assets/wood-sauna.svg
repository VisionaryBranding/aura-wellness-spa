<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6f4b2d"/>
      <stop offset="55%" stop-color="#332a21"/>
      <stop offset="100%" stop-color="#0e1612"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#ffb25c" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#ffb25c" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity=".35"/>
  
  <rect x="0" y="570" width="1200" height="230" fill="#3b2a1f" opacity=".78"/>
  <path d="M0 570 C230 500 460 620 700 520 C900 440 1060 480 1200 430 V800 H0Z" fill="#141f18" opacity=".72"/>
  <rect x="590" y="355" width="135" height="190" rx="28" fill="#111712"/>
  <rect x="555" y="560" width="210" height="28" rx="14" fill="#d28a3e"/>
  <circle cx="660" cy="640" r="72" fill="#e96b2d" opacity=".8" filter="url(#blur)"/>
  <g stroke="#d69454" stroke-width="7" opacity=".5">
    <path d="M0 145H1200M0 230H1200M0 315H1200M0 400H1200"/>
  </g>
  <rect x="100" y="500" width="410" height="78" rx="18" fill="#b77b45" opacity=".62"/>
  <rect x="90" y="585" width="460" height="70" rx="16" fill="#5d3c25" opacity=".85"/>

  <text x="70" y="730" fill="rgba(255,255,255,.62)" font-family="Inter, Arial" font-size="28" font-weight="800" letter-spacing="8">WOOD BURNING SAUNA</text>
</svg>