<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c88b4d"/>
      <stop offset="55%" stop-color="#6a3d23"/>
      <stop offset="100%" stop-color="#171a15"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#ffb06a" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#ffb06a" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity=".35"/>
  
  <rect x="0" y="520" width="1200" height="280" fill="#8b562e" opacity=".6"/>
  <g stroke="#ffe0b6" stroke-width="8" opacity=".36">
    <path d="M0 145H1200M0 235H1200M0 325H1200M0 415H1200M0 505H1200"/>
    <path d="M120 0V800M245 0V800M370 0V800M495 0V800M620 0V800M745 0V800M870 0V800M995 0V800"/>
  </g>
  <rect x="165" y="470" width="860" height="90" rx="18" fill="#f4c58d" opacity=".46"/>
  <rect x="170" y="560" width="850" height="72" rx="16" fill="#5c371f" opacity=".76"/>
  <rect x="130" y="615" width="920" height="22" fill="#f8e2c6" opacity=".55"/>
  <circle cx="880" cy="300" r="135" fill="#ff8c43" opacity=".18" filter="url(#blur)"/>

  <text x="70" y="730" fill="rgba(255,255,255,.62)" font-family="Inter, Arial" font-size="28" font-weight="800" letter-spacing="8">INFRARED SAUNA</text>
</svg>