<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ccbca9"/>
      <stop offset="55%" stop-color="#78695d"/>
      <stop offset="100%" stop-color="#191f1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity=".35"/>
  
  <rect x="0" y="530" width="1200" height="270" fill="#1a241f" opacity=".7"/>
  <ellipse cx="585" cy="390" rx="220" ry="255" fill="#e1c2a6" opacity=".78"/>
  <ellipse cx="585" cy="395" rx="150" ry="205" fill="#f1d8bf" opacity=".55"/>
  <circle cx="535" cy="355" r="14" fill="#24322a"/><circle cx="635" cy="355" r="14" fill="#24322a"/>
  <path d="M540 465 Q585 500 635 465" stroke="#24322a" stroke-width="10" fill="none" opacity=".55"/>
  <g fill="#ffffff" opacity=".18" filter="url(#blur)">
    <circle cx="280" cy="230" r="130"/><circle cx="880" cy="250" r="160"/>
  </g>

  <text x="70" y="730" fill="rgba(255,255,255,.62)" font-family="Inter, Arial" font-size="28" font-weight="800" letter-spacing="8">FACIAL RITUAL</text>
</svg>