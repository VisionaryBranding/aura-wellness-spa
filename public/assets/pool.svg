<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7fc7d7"/>
      <stop offset="55%" stop-color="#367b81"/>
      <stop offset="100%" stop-color="#10211c"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#b7f5ff" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#b7f5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>
  <rect width="1200" height="800" filter="url(#grain)" opacity=".35"/>
  
  <rect x="0" y="455" width="1200" height="345" fill="#1f737d" opacity=".78"/>
  <path d="M0 510 C180 470 310 550 480 515 C650 480 760 535 920 510 C1040 490 1120 500 1200 478 V800H0Z" fill="#7bd5e6" opacity=".35"/>
  <path d="M0 610 C180 570 310 650 480 615 C650 580 760 635 920 610 C1040 590 1120 600 1200 578 V800H0Z" fill="#a5effa" opacity=".18"/>
  <rect x="0" y="400" width="1200" height="65" fill="#f1e2c9" opacity=".52"/>
  <rect x="130" y="355" width="160" height="42" rx="20" fill="#e8d4b4" opacity=".85"/>
  <rect x="330" y="355" width="160" height="42" rx="20" fill="#e8d4b4" opacity=".85"/>
  <circle cx="900" cy="300" r="180" fill="#ffcb7a" opacity=".2" filter="url(#blur)"/>

  <text x="70" y="730" fill="rgba(255,255,255,.62)" font-family="Inter, Arial" font-size="28" font-weight="800" letter-spacing="8">INDOOR POOL</text>
</svg>